<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Simulator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-900 text-white font-sans selection:bg-blue-500">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const darkenHex = (hex, percent) => {
          const cleanHex = hex.replace('#', '');
          let r = parseInt(cleanHex.substring(0, 2), 16);
          let g = parseInt(cleanHex.substring(2, 4), 16);
          let b = parseInt(cleanHex.substring(4, 6), 16);
          r = Math.floor(r * (1 - percent));
          g = Math.floor(g * (1 - percent));
          b = Math.floor(b * (1 - percent));
          const toHex = (n) => n.toString(16).padStart(2, '0');
          return `#${toHex(r)}${toHex(g)}${toHex(b)}`;
        };

        const generateDepthShadow = (hexColor, depthLayers, isKeycap = false) => {
          const darkColor = darkenHex(hexColor, 0.3);
          let shadows = [];
          for (let i = 1; i <= depthLayers; i++) {
            shadows.push(`-${i}px ${i}px 0 ${darkColor}`);
          }
          if (isKeycap) {
            shadows.push(`inset 0 2px 5px rgba(255,255,255,0.2)`);
            shadows.push(`-${depthLayers + 4}px ${depthLayers + 4}px 8px rgba(0,0,0,0.5)`);
          } else {
            shadows.push(`inset -2px 2px 8px rgba(255,255,255,0.15)`);
            shadows.push(`inset 2px -2px 8px rgba(0,0,0,0.4)`);
            shadows.push(`-${depthLayers + 15}px ${depthLayers + 15}px 30px rgba(0,0,0,0.7)`);
          }
          return shadows.join(', ');
        };

        const FILAMENTS = [
          { id: 'black', name: 'Black', hex: '#262626' },
          { id: 'bone-white', name: 'Bone White', hex: '#E3DAC9' },
          { id: 'blue', name: 'Sunlu Klein Blue', hex: '#002FA7' },
          { id: 'cyan', name: 'Sunlu Cyan', hex: '#00FFFF' }, // Added Sunlu Cyan here
          { id: 'red', name: 'Red', hex: '#DC2626' },
          { id: 'yellow', name: 'Vvivid Yellow', hex: '#FFCC00' },
          { id: 'dark-green', name: 'Olive Green', hex: '#556B2F' },
          { id: 'light-green', name: 'Bambu Green', hex: '#00AE42' },
        ];

        function App() {
          const [caseColor, setCaseColor] = useState(FILAMENTS[1].hex); 
          const [capColor, setCapColor] = useState(FILAMENTS[0].hex);   
          const [textColor, setTextColor] = useState(FILAMENTS[4].hex); 
          const [friendName, setFriendName] = useState('CLICK');

          const numKeys = Math.max(1, friendName.length);
          const keysArray = Array.from({ length: numKeys }, (_, i) => i);

          const caseShadow = generateDepthShadow(caseColor, 25, false);
          const capShadowNormal = generateDepthShadow(capColor, 8, true);
          const capShadowActive = generateDepthShadow(capColor, 2, true);
          const dynamicScale = Math.min(1.1, 7 / Math.max(5, numKeys));

          const ColorPicker = ({ title, selectedColor, onSelect }) => (
            <div className="mb-6">
              <h3 className="text-sm font-bold text-gray-400 uppercase tracking-wider mb-3">{title}</h3>
              <div className="flex flex-wrap gap-3">
                {FILAMENTS.map((fil) => (
                  <button
                    key={fil.id}
                    onClick={() => onSelect(fil.hex)}
                    title={fil.name}
                    className={`w-10 h-10 rounded-full border-2 transition-all transform hover:scale-110 ${
                      selectedColor === fil.hex ? 'border-white scale-110 shadow-lg' : 'border-transparent shadow-md'
                    }`}
                    style={{ backgroundColor: fil.hex }}
                  />
                ))}
              </div>
            </div>
          );

          return (
            <div className="min-h-screen py-12 px-4 flex flex-col items-center">
              <style>{`
                .scene { perspective: 1200px; }
                .pad-case { transform-style: preserve-3d; }
                .keycap { box-shadow: var(--cap-shadow-normal); transform: translate(0px, 0px); }
                .keycap:active { box-shadow: var(--cap-shadow-active); transform: translate(-6px, 6px); }
              `}</style>

              <div className="max-w-5xl w-full">
                <header className="text-center mb-6">
                  <h1 className="text-4xl font-extrabold mb-4">Color Simulator</h1>
                  <p className="text-gray-400 font-medium text-lg mb-8 uppercase tracking-widest">
                    Real ones look more like this:
                  </p>
                </header>

                <div className="flex flex-wrap justify-center gap-8 mb-16">
                  <div className="w-56 h-56 md:w-72 md:h-72 bg-gray-800 rounded-3xl border-2 border-gray-700 overflow-hidden shadow-2xl transition-all hover:border-blue-500">
                    <img src="previe1.png" alt="Reference 1" className="w-full h-full object-cover" />
                  </div>
                  <div className="w-56 h-56 md:w-72 md:h-72 bg-gray-800 rounded-3xl border-2 border-gray-700 overflow-hidden shadow-2xl transition-all hover:border-blue-500">
                    <img src="preview2.png" alt="Reference 2" className="w-full h-full object-cover" />
                  </div>
                </div>

                <div className="text-center mb-10 px-4">
                  <h2 className="text-xl md:text-2xl font-bold text-blue-400 leading-tight">
                    Feel free to change the text and color, capture your screen and send it to me! :)
                  </h2>
                  <div className="h-1 w-24 bg-blue-500 mx-auto mt-4 rounded-full opacity-50"></div>
                </div>

                <div className="grid grid-cols-1 lg:grid-cols-2 gap-12 bg-gray-800 p-8 rounded-3xl border border-gray-700 shadow-2xl">
                  <div className="scene flex justify-center items-center bg-gray-900 rounded-2xl h-[500px] border border-gray-800 relative">
                    <div className="absolute top-4 left-4 text-xs font-mono text-gray-500 uppercase tracking-tighter">Live Preview</div>
                    <div className="pad-case rounded-2xl p-3 transition-all duration-300"
                      style={{ 
                        backgroundColor: caseColor,
                        boxShadow: caseShadow,
                        transform: `rotateX(55deg) rotateZ(-35deg) scale(${dynamicScale})`
                      }}>
                      <div className="flex flex-col gap-2 p-2 rounded-xl" style={{ backgroundColor: darkenHex(caseColor, 0.15) }}>
                        {keysArray.map((i) => (
                          <button key={i} className="keycap w-16 h-16 rounded-lg flex items-center justify-center font-black text-4xl"
                            style={{ 
                              backgroundColor: capColor, color: textColor,
                              '--cap-shadow-normal': capShadowNormal, '--cap-shadow-active': capShadowActive,
                            }}>
                            {friendName.charAt(i) || ' '}
                          </button>
                        ))}
                      </div>
                    </div>
                  </div>

                  <div className="flex flex-col">
                    <div className="mb-8">
                      <h3 className="text-sm font-bold text-gray-400 uppercase mb-3">Custom Text</h3>
                      <input type="text" maxLength={5} value={friendName}
                        onChange={(e) => setFriendName(e.target.value.toUpperCase())}
                        className="w-full bg-gray-900 border border-gray-700 text-white rounded-lg px-4 py-3 font-mono text-lg outline-none uppercase shadow-inner focus:border-blue-500 transition-colors" />
                    </div>
                    <ColorPicker title="1. Case Filament" selectedColor={caseColor} onSelect={setCaseColor} />
                    <ColorPicker title="2. Keycap Filament" selectedColor={capColor} onSelect={setCapColor} />
                    <ColorPicker title="3. Text Color" selectedColor={textColor} onSelect={setTextColor} />
                    
                    <div className="mt-4 pt-4 border-t border-gray-700">
                       <p className="text-[10px] text-gray-500 uppercase font-bold tracking-widest mb-2">Selected Parts:</p>
                       <div className="flex gap-2">
                          <div className="w-4 h-4 rounded-full border border-gray-600" style={{backgroundColor: caseColor}}></div>
                          <div className="w-4 h-4 rounded-full border border-gray-600" style={{backgroundColor: capColor}}></div>
                          <div className="w-4 h-4 rounded-full border border-gray-600" style={{backgroundColor: textColor}}></div>
                       </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
