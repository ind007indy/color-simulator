<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Simulator</title>
    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Load React -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Load Babel so React JSX works in the browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-900 text-white font-sans selection:bg-blue-500">
    
    <!-- This is where the app will appear -->
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // --- Helper functions for generating 3D isometric depth ---
        const darkenHex = (hex, percent) => {
          const cleanHex = hex.replace('#', '');
          let r = parseInt(cleanHex.substring(0, 2), 16);
          let g = parseInt(cleanHex.substring(2, 4), 16);
          let b = parseInt(cleanHex.substring(4, 6), 16);
          
          r = Math.floor(r * (1 - percent));
          g = Math.floor(g * (1 - percent));
          b = Math.floor(b * (1 - percent));
          
          const toHex = (n) => n.toString(16).padStart(2, '0');
          return `#${toHex(r)}${toHex(g)}${toHex(b)}`;
        };

        const generateDepthShadow = (hexColor, depthLayers, isKeycap = false) => {
          const darkColor = darkenHex(hexColor, 0.3);
          let shadows = [];
          
          for (let i = 1; i <= depthLayers; i++) {
            shadows.push(`-${i}px ${i}px 0 ${darkColor}`);
          }
          
          if (isKeycap) {
            shadows.push(`inset 0 2px 5px rgba(255,255,255,0.2)`);
            shadows.push(`-${depthLayers + 4}px ${depthLayers + 4}px 8px rgba(0,0,0,0.5)`);
          } else {
            shadows.push(`inset -2px 2px 8px rgba(255,255,255,0.15)`);
            shadows.push(`inset 2px -2px 8px rgba(0,0,0,0.4)`);
            shadows.push(`-${depthLayers + 15}px ${depthLayers + 15}px 30px rgba(0,0,0,0.7)`);
          }
          return shadows.join(', ');
        };

        const FILAMENTS = [
          { id: 'black', name: 'Black', hex: '#262626' },
          { id: 'bone-white', name: 'Bone White', hex: '#E3DAC9' },
          { id: 'blue', name: 'Sunlu Klein Blue', hex: '#002FA7' },
          { id: 'red', name: 'Red', hex: '#DC2626' },
          { id: 'yellow', name: 'Vvivid Yellow', hex: '#FFCC00' },
          { id: 'dark-green', name: 'Olive Green', hex: '#556B2F' },
          { id: 'light-green', name: 'Bambu Green', hex: '#00AE42' },
        ];

        function App() {
          const [caseColor, setCaseColor] = useState(FILAMENTS[1].hex); 
          const [capColor, setCapColor] = useState(FILAMENTS[0].hex);   
          const [textColor, setTextColor] = useState(FILAMENTS[4].hex); 
          const [friendName, setFriendName] = useState('CLICK');

          const numKeys = Math.max(1, friendName.length);
          const keysArray = Array.from({ length: numKeys }, (_, i) => i);

          const caseShadow = generateDepthShadow(caseColor, 25, false);
          const capShadowNormal = generateDepthShadow(capColor, 8, true);
          const capShadowActive = generateDepthShadow(capColor, 2, true);

          const dynamicScale = Math.min(1.1, 7 / Math.max(5, numKeys));

          const ColorPicker = ({ title, selectedColor, onSelect }) => (
            <div className="mb-6">
              <h3 className="text-sm font-bold text-gray-400 uppercase tracking-wider mb-3">
                {title}
              </h3>
              <div className="flex flex-wrap gap-3">
                {FILAMENTS.map((fil) => (
                  <button
                    key={fil.id}
                    onClick={() => onSelect(fil.hex)}
                    title={fil.name}
                    className={`w-10 h-10 rounded-full border-2 transition-all transform hover:scale-110 ${
                      selectedColor === fil.hex ? 'border-white scale-110 shadow-lg' : 'border-transparent shadow-md'
                    }`}
                    style={{ backgroundColor: fil.hex }}
                  />
                ))}
              </div>
            </div>
          );

          return (
            <div className="min-h-screen py-12 px-4 flex flex-col items-center">
              <style>{`
                .scene { perspective: 1200px; }
                .pad-case { transform-style: preserve-3d; border: 1px solid rgba(255,255,255,0.05); }
                .keycap { box-shadow: var(--cap-shadow-normal); transform: translate(0px, 0px); }
                .keycap:active { box-shadow: var(--cap-shadow-active); transform: translate(-6px, 6px); }
              `}</style>

              <div className="max-w-5xl w-full">
                <header className="text-center mb-12">
                  <h1 className="text-4xl font-extrabold tracking-tight mb-2 text-white">
                    Color Simulator
                  </h1>
                  <p className="text-gray-400">Design your custom color</p>
                </header>

                <div className="grid grid-cols-1 lg:grid-cols-2 gap-12 items-start bg-gray-800 p-8 rounded-3xl border border-gray-700 shadow-2xl">
                  
                  {/* 3D Visualizer Area */}
                  <div className="scene flex justify-center items-center bg-gray-900 rounded-2xl h-[500px] border border-gray-800 overflow-hidden relative">
                    <div className="absolute top-4 left-4 text-xs font-mono text-gray-500">
                      Interactive 3D Preview
                    </div>
                    
                    <div 
                      className="pad-case rounded-2xl p-3 transition-all duration-300 ease-out"
                      style={{ 
                        backgroundColor: caseColor,
                        boxShadow: caseShadow,
                        transform: `rotateX(55deg) rotateZ(-35deg) scale(${dynamicScale})`
                      }}
                    >
                      <div 
                        className="flex flex-col gap-2 p-2 rounded-xl"
                        style={{
                          backgroundColor: darkenHex(caseColor, 0.15),
                          boxShadow: `inset 4px 4px 12px rgba(0,0,0,0.6), inset -2px -2px 6px rgba(255,255,255,0.15)`
                        }}
                      >
                        {keysArray.map((i) => (
                          <button
                            key={i}
                            className="keycap w-16 h-16 rounded-lg flex items-center justify-center font-black text-4xl transition-all duration-100 cursor-pointer select-none outline-none focus:outline-none"
                            style={{ 
                              backgroundColor: capColor, 
                              color: textColor,
                              '--cap-shadow-normal': capShadowNormal,
                              '--cap-shadow-active': capShadowActive,
                            }}
                          >
                            {friendName.charAt(i) || ' '}
                          </button>
                        ))}
                      </div>
                    </div>
                  </div>

                  {/* Controls Area */}
                  <div className="flex flex-col gap-2">
                    
                    <div className="mb-8">
                      <h3 className="text-sm font-bold text-gray-400 uppercase tracking-wider mb-3">
                        Text on Keys (Up to 5 Letters)
                      </h3>
                      <input
                        type="text"
                        maxLength={5}
                        value={friendName}
                        onChange={(e) => setFriendName(e.target.value.toUpperCase())}
                        placeholder="Name..."
                        className="w-full bg-gray-900 border border-gray-700 text-white rounded-lg px-4 py-3 font-mono text-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all uppercase shadow-inner"
                      />
                    </div>

                    <div className="h-px w-full bg-gray-700 mb-8 rounded-full"></div>

                    <ColorPicker title="1. Case Filament" selectedColor={caseColor} onSelect={setCaseColor} />
                    <ColorPicker title="2. Keycap Filament" selectedColor={capColor} onSelect={setCapColor} />
                    <ColorPicker title="3. Text Filament" selectedColor={textColor} onSelect={setTextColor} />

                    <div className="mt-6 p-4 bg-gray-900 rounded-lg border border-gray-700 text-sm">
                      <p className="text-gray-400 mb-1">Current Configuration:</p>
                      <ul className="text-gray-200 font-mono space-y-1">
                        <li><span className="text-gray-500 w-12 inline-block">Case:</span> {FILAMENTS.find(f => f.hex === caseColor)?.name}</li>
                        <li><span className="text-gray-500 w-12 inline-block">Caps:</span> {FILAMENTS.find(f => f.hex === capColor)?.name}</li>
                        <li><span className="text-gray-500 w-12 inline-block">Text:</span> {FILAMENTS.find(f => f.hex === textColor)?.name}</li>
                      </ul>
                    </div>

                  </div>
                </div>
              </div>
            </div>
          );
        }

        // Render the app
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
